<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Lucky Geo Spin</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
  <style>
    :root { --accent: #8b5cf6; --bg: #0f172a; --card: #1e293b; }
    body { margin: 0; font-family: 'Pretendard', sans-serif; background: var(--bg); color: white; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
    header { width: 100%; padding: 20px; text-align: center; background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(10px); margin-bottom: 20px; }
    .wrap { width: 95%; max-width: 800px; }
    #map { height: 400px; border-radius: 20px; border: 3px solid #334155; box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin-bottom: 20px; }
    .controls { display: flex; gap: 15px; justify-content: center; margin-bottom: 20px; }
    button { padding: 15px 30px; border: none; border-radius: 50px; font-weight: 800; cursor: pointer; font-size: 1.1rem; transition: 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
    button:active { transform: scale(0.9); }
    #startBtn { background: #8b5cf6; color: white; }
    #stopBtn { background: #ef4444; color: white; }
    .info { background: var(--card); padding: 25px; border-radius: 20px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
    .selected { font-size: 2rem; color: #fbbf24; font-weight: 900; margin: 10px 0; display: block; text-shadow: 0 0 15px rgba(251,191,36,0.6); }
  </style>
</head>
<body>
  <header><h1>🎰 Lucky Geo Spin</h1></header>

  <div class="wrap">
    <div class="controls">
      <button id="startBtn">🎰 랜덤 시작</button>
      <button id="stopBtn">🚨 정지</button>
    </div>

    <div id="map"></div>

    <div class="info">
      <div>당첨 지역</div>
      <span id="currentName" class="selected">-</span>
      <div id="status">대기 중... 파일을 로드해주세요.</div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6.5.0/turf.min.js"></script>

  <script>
    const map = L.map('map').setView([36.5, 127.8], 7);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    let items = [];
    let layerGroup = L.layerGroup().addTo(map);
    let spinController = { running: false, stopRequested: false };

    function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

    function loadGeoJSON(geo) {
      const feats = geo.type === 'FeatureCollection' ? geo.features : [geo];
      feats.forEach((f) => {
        const name = f.properties?.SIG_KOR_NM || f.properties?.name || '알 수 없는 지역';
        const layer = L.geoJSON(f, { style: { color: '#6366f1', weight: 1, fillOpacity: 0.1 } }).addTo(layerGroup);
        let centroid = [36.5, 127.8];
        try { const c = turf.centroid(f).geometry.coordinates; centroid = [c[1], c[0]]; } catch(e){}
        items.push({ name, layer, centroid });
      });
    }

    function highlight(idx, color = '#fbbf24') {
      items.forEach((it, i) => {
        const active = (i === idx);
        it.layer.setStyle({ 
            color: active ? color : '#6366f1', 
            weight: active ? 4 : 1, 
            fillOpacity: active ? 0.6 : 0.1 
        });
      });
      currentName.textContent = items[idx].name;
    }

    async function runSpin() {
      if(items.length === 0) return alert("데이터 없음");
      if(spinController.running) return;
      
      spinController.running = true;
      spinController.stopRequested = false;
      let idx = 0;
      let speed = 40; // 시작 속도 (ms)

      // 1. 고속 회전 구간
      statusEl.textContent = "돌아가는 중...";
      while(!spinController.stopRequested) {
        idx = (idx + 1) % items.length;
        highlight(idx);
        await sleep(speed);
      }

      // 2. 브레이크 구간 (슬롯머신 느낌)
      statusEl.textContent = "브레이크 작동 중...";
      let brakeSteps = 20 + Math.floor(Math.random() * 10);
      while(brakeSteps > 0) {
        idx = (idx + 1) % items.length;
        highlight(idx);
        speed += 30; // 점점 느려짐
        await sleep(speed);
        brakeSteps--;
      }

      // 3. 최종 선택 및 줌
      highlight(idx, '#f59e0b');
      statusEl.textContent = "당첨!";
      map.setView(items[idx].centroid, 11, { animate: true }); // 지도 줌
      spinController.running = false;
    }

    // 버튼 이벤트
    document.getElementById('startBtn').addEventListener('click', runSpin);
    document.getElementById('stopBtn').addEventListener('click', () => { spinController.stopRequested = true; });

    // 데이터 로드
    async function loadData() {
      try {
        const res = await fetch('./TL_SCCO_SIG.json');
        const geo = await res.json();
        loadGeoJSON(geo);
        statusEl.textContent = `${items.length}개 지역 준비 완료`;
      } catch (e) { statusEl.textContent = "데이터를 불러오지 못했습니다."; }
    }
    loadData();
  </script>
</body>
</html>
