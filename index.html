<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Lucky Geo Spin</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
  <style>
    :root { --primary: #6366f1; --dark: #1e293b; --light: #f8fafc; }
    body { margin: 0; font-family: 'Pretendard', sans-serif; background: #0f172a; color: white; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
    header { width: 100%; padding: 20px; text-align: center; background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(10px); }
    .wrap { width: 95%; max-width: 900px; margin-top: 20px; }
    
    #map { height: 500px; border-radius: 16px; border: 4px solid #334155; box-shadow: 0 10px 25px rgba(0,0,0,0.3); margin-bottom: 20px; }
    
    .controls { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; flex-wrap: wrap; }
    button { padding: 12px 24px; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; transition: transform 0.1s, background 0.3s; }
    button:active { transform: scale(0.95); }
    #startBtn { background: #22c55e; color: white; }
    #stopBtn { background: #ef4444; color: white; }
    
    .info { background: rgba(255,255,255,0.1); backdrop-filter: blur(5px); padding: 20px; border-radius: 16px; text-align: center; }
    .selected { font-size: 1.5rem; color: #fbbf24; font-weight: 900; margin-top: 5px; display: block; text-shadow: 0 0 10px rgba(251,191,36,0.5); }
    #status { margin-top: 10px; color: #94a3b8; font-size: 0.9rem; }
  </style>
</head>
<body>
  <header><h1>📍 Lucky Geo Spin</h1></header>

  <div class="wrap">
    <div class="controls">
      <label style="background:#475569; padding:12px 24px; border-radius:12px; cursor:pointer; font-weight:700;">
        파일 선택 <input id="fileInput" type="file" accept=".geojson,.json,.csv,.zip" multiple style="display:none">
      </label>
      <button id="startBtn">🎰 랜덤 시작</button>
      <button id="stopBtn" class="secondary">🚨 정지</button>
    </div>

    <div id="map"></div>

    <div class="info">
      <div>현재 선택된 지역</div>
      <span id="currentName" class="selected">-</span>
      <div id="status">대기 중</div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6.5.0/turf.min.js"></script>
  <script src="https://unpkg.com/shpjs@latest/dist/shp.min.js"></script>

  <script>
    const map = L.map('map').setView([36.5,127.8], 7);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    let items = [];
    let layerGroup = L.layerGroup().addTo(map);
    let marker = null;
    let spinController = { running:false, stopRequested:false, immediateStop:false };

    function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }
    function cryptoRandomInt(max){ const a=new Uint32Array(1); crypto.getRandomValues(a); return a[0] % max; }

    function loadGeoJSON(geo){
      const feats = geo.type === 'FeatureCollection' ? geo.features : [geo];
      feats.forEach((f) => {
        const name = f.properties?.SIG_KOR_NM || f.properties?.name || '알 수 없는 지역';
        const layer = L.geoJSON(f, { style:{ color:'#6366f1', weight:2, fillOpacity:0.1 } }).addTo(layerGroup);
        let centroid = [36.5, 127.8];
        try { const c = turf.centroid(f).geometry.coordinates; centroid = [c[1], c[0]]; } catch(e){}
        items.push({ name, layer, centroid });
        layer.bindTooltip(name);
      });
    }

    function highlightIndex(idx, color='#fbbf24'){
      items.forEach((it, i) => {
        it.layer.setStyle({ color: i === idx ? color : '#6366f1', weight: i === idx ? 4 : 2, fillOpacity: i === idx ? 0.5 : 0.1 });
      });
      currentName.textContent = items[idx].name;
    }

    async function runSpinFastStop(){
      const len = items.length;
      let idx = 0;
      spinController.stopRequested = false;
      
      // 빠르게 돌기
      while(!spinController.stopRequested){
        idx = (idx + 1) % len;
        highlightIndex(idx);
        await sleep(50);
      }

      // 감속하며 멈추기 (슬롯 느낌)
      let brakeSteps = 15 + cryptoRandomInt(10);
      let delay = 80;
      while(brakeSteps > 0){
        idx = (idx + 1) % len;
        highlightIndex(idx);
        delay += 30; // 점점 느리게
        await sleep(delay);
        brakeSteps--;
      }
      statusEl.textContent = "결과 확정!";
      spinController.running = false;
    }

    startBtn.addEventListener('click', () => {
      if(items.length === 0) return alert("데이터를 먼저 로드하세요.");
      if(spinController.running) return;
      spinController.running = true;
      runSpinFastStop();
    });

    stopBtn.addEventListener('click', () => { spinController.stopRequested = true; });

    // 데이터 자동 로드
    async function loadDefaultData() {
      try {
        const response = await fetch('TL_SCCO_SIG.json');
        if (!response.ok) return;
        const geo = await response.json();
        loadGeoJSON(geo);
        statusEl.textContent = `데이터 로드 완료: ${items.length}개 지역`;
      } catch (e) { statusEl.textContent = "데이터 파일 로드 실패"; }
    }

    window.addEventListener('load', () => { loadDefaultData(); });
  </script>
</body>
</html>
