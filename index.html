<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>우리 커플 여행</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
  <style>
    body { margin: 0; font-family: 'Pretendard', sans-serif; background: #0f172a; color: white; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
    header { width: 100%; padding: 20px; text-align: center; background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(10px); }
    .wrap { width: 95%; max-width: 900px; margin: 20px 0; }
    #map { height: 500px; border-radius: 16px; border: 4px solid #334155; box-shadow: 0 10px 25px rgba(0,0,0,0.5); margin-bottom: 20px; }
    .controls { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; }
    button { padding: 12px 24px; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; transition: 0.2s; }
    #startBtn { background: #8b5cf6; color: white; }
    #stopBtn { background: #ef4444; color: white; }
    .info { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 16px; text-align: center; }
    .selected { font-size: 1.8rem; color: #fbbf24; font-weight: 900; display: block; }
  </style>
</head>
<body>
  <header><h1>🎰 여행 지역을 찾아서~</h1></header>
  <div class="wrap">
    <div class="controls">
      <button id="startBtn">🎰 랜덤 시작</button>
      <button id="stopBtn">🚨 정지</button>
    </div>
    <div id="map"></div>
    <div class="info">
      <div>최종 당첨 지역</div>
      <span id="currentName" class="selected">-</span>
      <div id="status">대기 중</div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6.5.0/turf.min.js"></script>

  <script>
    const map = L.map('map').setView([36.5, 127.8], 7);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    let items = [];
    let layerGroup = L.layerGroup().addTo(map);
    let spinController = { running: false, stopRequested: false };

    function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
    function cryptoRandomInt(max) { return Math.floor(Math.random() * max); }

    function loadGeoJSON(geo) {
      const feats = geo.type === 'FeatureCollection' ? geo.features : [geo];
      feats.forEach((f) => {
        const name = f.properties?.SIG_KOR_NM || f.properties?.name || '지역';
        const layer = L.geoJSON(f, { style: { color: '#6366f1', weight: 1, fillOpacity: 0.1 } }).addTo(layerGroup);
        let centroid = [36.5, 127.8];
        try { const c = turf.centroid(f).geometry.coordinates; centroid = [c[1], c[0]]; } catch(e){}
        items.push({ name, layer, centroid });
      });
    }

    async function runSpin() {
      if(items.length === 0) return alert("데이터 없음");
      spinController.running = true;
      spinController.stopRequested = false;
      let idx = 0;
      let speed = 50;

      // 1. 순환 시작
      while(!spinController.stopRequested) {
        idx = cryptoRandomInt(items.length); // 완전 랜덤 점프
        highlight(idx);
        await sleep(speed);
      }

      // 2. 정지 버튼 누르면 서서히 멈춤
      statusEl.textContent = "브레이크 작동 중...";
      let brakeSteps = 20;
      while(brakeSteps > 0) {
        idx = cryptoRandomInt(items.length);
        highlight(idx);
        speed += 30; // 점점 느리게
        await sleep(speed);
        brakeSteps--;
      }

      // 3. 최종 선택 및 줌
      const finalIdx = idx;
      highlight(finalIdx, '#f59e0b');
      map.setView(items[finalIdx].centroid, 11, { animate: true });
      statusEl.textContent = "결과 확정!";
      spinController.running = false;
    }

    function highlight(idx, color = '#fbbf24') {
      items.forEach((it, i) => {
        it.layer.setStyle({ color: i === idx ? color : '#6366f1', weight: i === idx ? 3 : 1, fillOpacity: i === idx ? 0.6 : 0.1 });
      });
      currentName.textContent = items[idx].name;
    }

    startBtn.addEventListener('click', runSpin);
    stopBtn.addEventListener('click', () => { spinController.stopRequested = true; });

    async function loadData() {
      const res = await fetch('TL_SCCO_SIG.json');
      const geo = await res.json();
      loadGeoJSON(geo);
    }
    loadData();
  </script>
</body>
</html>
