<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Lucky Geo Spin</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
  <style>
    body { margin: 0; font-family: 'Pretendard', sans-serif; background: #0f172a; color: white; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
    header { width: 100%; padding: 20px; text-align: center; background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(10px); }
    .wrap { width: 95%; max-width: 900px; margin: 20px 0; }
    #map { height: 500px; border-radius: 16px; border: 4px solid #334155; box-shadow: 0 10px 25px rgba(0,0,0,0.5); margin-bottom: 20px; }
    .controls { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; }
    button { padding: 15px 30px; border: none; border-radius: 50px; font-weight: 800; cursor: pointer; transition: 0.2s; }
    #startBtn { background: #8b5cf6; color: white; }
    #stopBtn { background: #ef4444; color: white; }
    .info { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 16px; text-align: center; }
    .selected { font-size: 1.5rem; color: #fbbf24; font-weight: 900; display: block; }
  </style>
</head>
<body>
  <header><h1>🎰 Lucky Geo Spin</h1></header>
  <div class="wrap">
    <div class="controls">
      <button id="startBtn">🎰 랜덤 시작</button>
      <button id="stopBtn">🚨 정지</button>
    </div>
    <div id="map"></div>
    <div class="info">
      <div>당첨 지역</div>
      <span id="currentName" class="selected">-</span>
      <div id="status">대기 중...</div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6.5.0/turf.min.js"></script>

  <script>
    const map = L.map('map').setView([36.5, 127.8], 7);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    let items = [];
    let layerGroup = L.layerGroup().addTo(map);
    let spinController = { running: false, stopRequested: false };

    function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
    function cryptoRandomInt(max) { return Math.floor(Math.random() * max); }

    function loadGeoJSON(geo) {
      const feats = geo.type === 'FeatureCollection' ? geo.features : [geo];
      feats.forEach((f) => {
        const name = f.properties?.SIG_KOR_NM || f.properties?.name || '지역';
        const layer = L.geoJSON(f, { style: { color: '#6366f1', weight: 1, fillOpacity: 0.1 } }).addTo(layerGroup);
        let centroid = [36.5, 127.8];
        try { const c = turf.centroid(f).geometry.coordinates; centroid = [c[1], c[0]]; } catch(e){}
        items.push({ name, layer, centroid });
      });
    }

    function highlight(idx, color = '#fbbf24') {
      items.forEach((it, i) => {
        const active = (i === idx);
        it.layer.setStyle({ color: active ? color : '#6366f1', weight: active ? 4 : 1, fillOpacity: active ? 0.5 : 0.1 });
      });
      currentName.textContent = items[idx].name;
    }

    async function runSpin() {
      // 데이터 체크 추가
      if(items.length === 0) {
        alert("데이터가 로드되지 않았습니다! 인터넷 연결이나 파일 경로를 확인하세요.");
        return;
      }
      if(spinController.running) return;
      
      spinController.running = true;
      spinController.stopRequested = false;
      let idx = 0;
      let speed = 40;

      // 1. 순환
      while(!spinController.stopRequested) {
        idx = cryptoRandomInt(items.length);
        highlight(idx);
        await sleep(speed);
      }

      // 2. 브레이크 (슬롯 느낌)
      let brakeSteps = 12;
      while(brakeSteps > 0) {
        idx = cryptoRandomInt(items.length);
        highlight(idx);
        speed += 30;
        await sleep(speed);
        brakeSteps--;
      }

      // 3. 최종 선택 및 줌
      highlight(idx, '#f59e0b');
      map.setView(items[idx].centroid, 11, { animate: true });
      document.getElementById('status').textContent = "결과 확정!";
      spinController.running = false;
    }

    document.getElementById('startBtn').addEventListener('click', runSpin);
    document.getElementById('stopBtn').addEventListener('click', () => { spinController.stopRequested = true; });

    async function loadData() {
      const status = document.getElementById('status');
      try {
        // 파일 경로 확인: URL이 https://rkekfkrk.github.io/random-map/ 이라면 
        // 파일이 루트에 있어야 바로 불러옵니다.
        const res = await fetch('TL_SCCO_SIG.json');
        if (!res.ok) throw new Error(`HTTP 오류: ${res.status}`);
        const geo = await res.json();
        loadGeoJSON(geo);
        status.textContent = `데이터 로드 완료: ${items.length}개 지역`;
      } catch (e) {
        status.textContent = "데이터 로드 실패! (개발자 도구 F12 확인)";
        console.error("데이터 불러오기 에러:", e);
      }
    }
    window.addEventListener('load', loadData);
  </script>
</body>
</html>
